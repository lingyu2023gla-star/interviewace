services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build: .
    command: uvicorn api.main:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    depends_on:
      redis:
        condition: service_healthy
    environment:
      INTERVIEWACE_DB_PATH: /app/data/interviews.db
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
    volumes:
      - ./data:/app/data
      - ./outputs:/app/outputs
      - ./exports:/app/exports

  worker:
    build: .
    command: celery -A worker.celery_app.celery_app worker --loglevel=info
    depends_on:
      redis:
        condition: service_healthy
    environment:
      INTERVIEWACE_DB_PATH: /app/data/interviews.db
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
    volumes:
      - ./data:/app/data
      - ./outputs:/app/outputs
      - ./exports:/app/exports

